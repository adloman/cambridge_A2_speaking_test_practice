<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2 Speaking - The Trap Edition</title>
    <style>
        :root {
            --primary: #2196F3;
            --danger: #ff4d4d;
            --success: #4CAF50;
            --bg: #f4f7f9;
            --sidebar-w: 260px;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); display: flex; margin: 0; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: var(--sidebar-w); background: white; border-right: 1px solid #ddd; padding: 25px; display: flex; flex-direction: column; z-index: 20; }
        .sidebar-title { font-weight: bold; color: #555; margin-bottom: 20px; border-bottom: 3px solid var(--primary); padding-bottom: 5px; font-size: 18px; }
        
        .player-chip { 
            padding: 15px; margin-bottom: 12px; background: #f9f9f9; border-radius: 12px; 
            font-size: 20px; font-weight: 600; border: 2px solid transparent; transition: 0.3s; 
        }
        .player-chip.active { border-color: var(--primary); background: #e3f2fd; font-weight: 800; transform: scale(1.05); }

        /* Score Animation */
        @keyframes hugePulse {
            0% { transform: scale(1); }
            50% { transform: scale(2.5); color: var(--primary); text-shadow: 0 0 40px rgba(33,150,243,0.6); }
            100% { transform: scale(1); }
        }
        .pulse-score { display: inline-block; animation: hugePulse 0.8s ease-in-out; animation-delay: 0.5s; }

        /* Timer Glow */
        @keyframes smoothGlow {
            0% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.03); }
            100% { opacity: 0.3; transform: scale(1); }
        }
        .timer-emergency { animation: smoothGlow 1.8s ease-in-out infinite !important; }

        #connector-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 5; }

        #main-content { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }

        #timer-background-container { position: absolute; width: 850px; height: 850px; display: flex; justify-content: center; align-items: center; z-index: 1; pointer-events: none; }
        #timer-svg-bg { width: 100%; height: 100%; }
        .bg-fill { fill: #d1d8df; opacity: 0.3; transition: fill 0.5s; }
        .timer-fill { fill: var(--danger); transform-origin: center; transform: rotate(-90deg); transition: d 0.1s linear; }

        #game-container { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 650px; text-align: center; position: relative; z-index: 10; }

        .option-btn { display: flex; width: 100%; padding: 18px; margin: 12px 0; border: 2px solid #f0f0f0; border-radius: 15px; background: white; cursor: pointer; font-size: 17px; text-align: left; align-items: center; transition: 0.3s; }
        .alpha-prefix { font-weight: 900; margin-right: 15px; color: var(--primary); font-size: 22px; width: 30px; }
        .selected-glow { border-color: var(--primary) !important; background: #e3f2fd !important; box-shadow: 0 0 25px rgba(33, 150, 243, 0.4); transform: scale(1.02); }

        #feedback-banner { display: none; position: fixed; bottom: 0; left: var(--sidebar-w); right: 0; background: white; box-shadow: 0 -5px 25px rgba(0,0,0,0.15); padding: 25px; z-index: 1001; align-items: center; justify-content: space-between; border-top: 5px solid #333; }
        .score-pill { color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 40px; min-width: 100px; text-align: center; }

        #player-inputs input { width: 85%; padding: 12px; margin: 6px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        .continue-btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }

        #winner-name { font-size: 90px; font-weight: 900; color: var(--primary); display: block; margin: 20px 0; }
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 100; border-radius: 2px; }

        /* New Reveal Box Style */
        #question-cover { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: #2c3e50; color: white; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: bold; font-size: 22px; z-index: 5;
            transition: 0.3s;
        }
        #question-cover:hover { background: #34495e; }
    </style>
</head>
<body>

<svg id="connector-canvas"><line id="connection-line" x1="0" y1="0" x2="0" y2="0" stroke="#2196F3" stroke-width="4" stroke-dasharray="8,5" /></svg>

<div id="sidebar">
    <div class="sidebar-title">Audio Settings</div>
    <div style="margin-bottom: 20px;">
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px;">
            <input type="checkbox" id="audio-toggle" checked> 🔊 Enable Voice
        </label>
    </div>
    <div class="sidebar-title">CLASS LIST</div>
    <div id="scoreboard"></div>
    <div class="settings-box" style="margin-top:auto; padding-top:10px; border-top:1px solid #eee;">
        <label>Time Limit: <span id="timer-val">25s</span></label><br>
        <input type="range" id="timer-input" min="25" max="90" value="25" style="width:100%" oninput="updateTimerSetting(this.value)">
    </div>
</div>

<div id="main-content">
    <div id="timer-background-container">
        <svg id="timer-svg-bg" viewBox="0 0 200 200">
            <circle id="bg-circle" class="bg-fill" cx="100" cy="100" r="100" />
            <path id="timer-path" class="timer-fill" d="M 100 100 L 100 0 A 100 100 0 0 1 100 0 Z" />
        </svg>
    </div>
    
    <div id="game-container">
        <div id="setup-screen">
            <h2>A2 Speaking Challenge</h2>
            <div id="player-inputs"></div>
            <button class="continue-btn" onclick="startGame()">Start Session</button>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div id="next-preview" style="font-size: 14px; color: #888; margin-bottom: 10px; font-weight: bold; text-transform: uppercase;">UP NEXT: ---</div>
            
            <div id="question-area" style="position: relative; min-height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
                <h2 id="question-text" style="display:none; margin: 0; padding: 10px;"></h2>
                <div id="question-cover" onclick="revealQuestion(true)">
                    ❓ CLICK TO REVEAL (-10% PTS)
                </div>
                <button id="replay-btn" onclick="playAudio()" style="position: absolute; right: -55px; top: 50%; transform: translateY(-50%); background: white; border: 1px solid #ddd; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">🔄</button>
            </div>

            <div id="options-container"></div>
        </div>

        <div id="winner-screen" style="display:none;">
            <h1 style="font-size: 40px; margin:0;">🏆 THE WINNER 🏆</h1>
            <span id="winner-name">NAME</span>
            <h2 id="winner-score" style="font-size: 60px;">0</h2>
            <button class="continue-btn" onclick="location.reload()">Reset Game</button>
        </div>
    </div>
</div>

<div id="feedback-banner">
    <div style="display:flex; align-items:center; gap:40px;">
        <div id="score-display" class="score-pill">0</div>
        <div><strong id="b-title" style="font-size: 24px;"></strong><br><span id="b-msg" style="font-size: 20px;"></span></div>
    </div>
    <button class="continue-btn" style="margin:0; width:auto; padding: 15px 40px;" onclick="pickNextPlayer()">Next Question →</button>
</div>

<script src="questions.js"></script>

<script>
   let players = [];
    let currentPlayerIndex = -1;
    let nextPlayerIndex = -1;
    let questionsPool = [];
    let timer;
    let timeLimit = 25;
    let timeLeft = 0;
    let isReviewing = false;
    let isRevealed = false;
    let autoRevealed = false; // New flag for time expiration
    let questionsAskedCount = 0;
    let currentData = null;

    const inputDiv = document.getElementById('player-inputs');
    for(let i=1; i<=7; i++) inputDiv.innerHTML += `<input type="text" placeholder="Student Name ${i}" id="p${i}-name">`;

    function updateTimerSetting(val) {
        timeLimit = parseInt(val);
        document.getElementById('timer-val').innerText = val + 's';
    }

    function startGame() {
        players = []; 
        for(let i=1; i<=7; i++) {
            let n = document.getElementById(`p${i}-name`).value.trim();
            if(n) players.push({name: n, score: 0});
        }
        if(players.length === 0) players.push({name: "Student 1", score: 0});
        
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        questionsPool = [...questionBank].sort(() => Math.random() - 0.5);
        currentPlayerIndex = Math.floor(Math.random() * players.length);
        setNextPlayer();
        showQuestion();
    }

    function playAudio() {
        if (!currentData) return;
        const audioEnabled = document.getElementById('audio-toggle').checked;
        if (audioEnabled) {
            const qIndex = questionBank.findIndex(q => q.q === currentData.q) + 1;
            if (qIndex > 0) {
                const audio = new Audio(`audio/q${qIndex}.mp3`);
                audio.play().catch(e => console.log("Audio blocked:", e));
            }
        }
    }

    function revealQuestion(manual = false) {
        if(isRevealed || autoRevealed) return;
        
        if(manual) {
            isRevealed = true;
        } else {
            autoRevealed = true;
        }
        
        document.getElementById('question-cover').style.display = 'none';
        document.getElementById('question-text').style.display = 'block';
    }

    function showQuestion() {
        if (questionsAskedCount >= questionBank.length || questionsPool.length === 0) {
            endGame();
            return;
        }

        isReviewing = false;
        isRevealed = false;
        autoRevealed = false;
        
        document.getElementById('feedback-banner').style.display = 'none';
        
        const audioEnabled = document.getElementById('audio-toggle').checked;
        
        // If audio is disabled, we reveal immediately without penalty
        if (!audioEnabled) {
            document.getElementById('question-cover').style.display = 'none';
            document.getElementById('question-text').style.display = 'block';
        } else {
            document.getElementById('question-cover').style.display = 'flex';
            document.getElementById('question-text').style.display = 'none';
        }
        
        updateSidebar();
        currentData = questionsPool.pop();
        questionsAskedCount++;
        
        playAudio();

        let cleanText = currentData.q.replace(/^\d+\.\s*/, ''); 
        document.getElementById('question-text').innerText = cleanText;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        const shuffled = [...currentData.options].sort(() => Math.random() - 0.5);
        const labels = ['A', 'B', 'C', 'D'];
        
        shuffled.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="alpha-prefix">${labels[idx]}</span> ${opt.text}`;
            btn.onclick = () => selectOption(btn, opt);
            container.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        timeLeft = 0;
        clearInterval(timer);
        const bgContainer = document.getElementById('timer-background-container');
        const bgCircle = document.getElementById('bg-circle');
        bgContainer.classList.remove('timer-emergency');
        bgCircle.style.fill = "#d1d8df";

        timer = setInterval(() => {
            timeLeft += 0.05;
            let ratio = timeLeft / timeLimit;
            updateCircle(ratio);

            if (timeLimit - timeLeft <= 5) {
                bgContainer.classList.add('timer-emergency');
                bgCircle.style.fill = "var(--danger)";
            }

            if (timeLeft >= timeLimit) {
                clearInterval(timer);
                revealQuestion(false); // Trigger auto-reveal (False = no manual penalty)
            }
        }, 50);
    }

    function updateCircle(percent) {
        const path = document.getElementById('timer-path');
        const p = Math.min(Math.max(percent, 0.0001), 0.9999);
        const x = 100 + 100 * Math.cos(2 * Math.PI * p - Math.PI / 2);
        const y = 100 + 100 * Math.sin(2 * Math.PI * p - Math.PI / 2);
        path.setAttribute('d', `M 100 100 L 100 0 A 100 100 0 ${p > 0.5 ? 1 : 0} 1 ${x} ${y} Z`);
    }

    function selectOption(btn, opt) {
        if(isReviewing) return;
        isReviewing = true;
        clearInterval(timer);
        
        const audioEnabled = document.getElementById('audio-toggle').checked;
        
        // Final Score Logic
        let multiplier = 1.0;
        let penaltyText = "";

        // Only apply penalties if Audio was actually enabled
        if (audioEnabled) {
            if (autoRevealed || timeLeft >= timeLimit) {
                multiplier = 0.7; // 30% penalty for running out of time
                penaltyText = " (Timer expired penalty -30%)";
            } else if (isRevealed) {
                multiplier = 0.9; // 10% penalty for manual reveal
                penaltyText = " (Reveal penalty -10%)";
            }
        }

        let finalScore = Math.floor(opt.score * multiplier);
        
        document.getElementById('timer-background-container').classList.remove('timer-emergency');
        document.getElementById('bg-circle').style.fill = "#d1d8df";
        if(btn) btn.classList.add('selected-glow');
        
        players[currentPlayerIndex].score += finalScore;
        updateSidebar(true);

        const scoreBox = document.getElementById('score-display');
        scoreBox.innerText = `+${finalScore}`;
        scoreBox.style.background = finalScore >= 70 ? 'var(--success)' : (finalScore >= 40 ? 'orange' : 'var(--danger)');
        
        document.getElementById('b-title').innerText = finalScore >= 70 ? "PERFECT!" : (finalScore === 0 ? "GRAMMAR TRAP!" : "GOOD TRY");
        document.getElementById('b-msg').innerText = opt.feedback + penaltyText;
        document.getElementById('feedback-banner').style.display = 'flex';
        
        // Ensure text is visible for review
        document.getElementById('question-cover').style.display = 'none';
        document.getElementById('question-text').style.display = 'block';
    }

    function setNextPlayer() {
        if (players.length > 1) {
            do { nextPlayerIndex = Math.floor(Math.random() * players.length); } 
            while (nextPlayerIndex === currentPlayerIndex);
        } else { nextPlayerIndex = 0; }
        document.getElementById('next-preview').innerText = `UP NEXT: ${players[nextPlayerIndex].name}`;
    }

    function updateSidebar(triggerPulse = false) {
        const board = document.getElementById('scoreboard');
        board.innerHTML = '';
        players.forEach((p, i) => {
            const isCurrent = (i === currentPlayerIndex);
            board.innerHTML += `<div class="player-chip ${isCurrent ? 'active' : ''}" id="chip-${i}">
                <span style="display:block">${p.name}</span>
                <span class="${isCurrent && triggerPulse ? 'pulse-score' : ''}" style="font-size: 28px; color: var(--primary)">${p.score}</span>
            </div>`;
        });
        setTimeout(drawLine, 50);
    }

    function drawLine() {
        const activeChip = document.getElementById(`chip-${currentPlayerIndex}`);
        const gameBox = document.getElementById('game-container');
        const line = document.getElementById('connection-line');
        if (!activeChip || !gameBox || document.getElementById('quiz-screen').style.display === 'none') {
            if(line) { line.setAttribute('x1', 0); line.setAttribute('y1', 0); }
            return;
        }
        const chipRect = activeChip.getBoundingClientRect();
        const boxRect = gameBox.getBoundingClientRect();
        line.setAttribute('x1', chipRect.right);
        line.setAttribute('y1', chipRect.top + (chipRect.height / 2));
        line.setAttribute('x2', boxRect.left);
        line.setAttribute('y2', boxRect.top + (boxRect.height / 2));
    }

    function pickNextPlayer() {
        currentPlayerIndex = nextPlayerIndex;
        setNextPlayer();
        showQuestion();
    }

    function endGame() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('winner-screen').style.display = 'block';
        document.getElementById('feedback-banner').style.display = 'none';
        
        const winner = [...players].sort((a,b) => b.score - a.score)[0];
        const winName = document.getElementById('winner-name');
        winName.innerText = winner.name;
        winName.classList.add('pulse-score'); 
        document.getElementById('winner-score').innerText = winner.score + " PTS";
        
        setInterval(createConfetti, 100);
    }

    function createConfetti() {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + "vw";
        c.style.top = "-10px";
        c.style.background = ["#2196F3", "#4CAF50", "#ff4d4d", "gold", "#9c27b0"][Math.floor(Math.random()*5)];
        document.body.appendChild(c);
        let pos = -10;
        let speed = 3 + Math.random() * 5;
        let interval = setInterval(() => {
            pos += speed;
            c.style.top = pos + "px";
            c.style.transform = `rotate(${pos}deg) translateX(${Math.sin(pos/30)*15}px)`;
            if(pos > window.innerHeight) { clearInterval(interval); c.remove(); }
        }, 20);
    }
</script>
</body>
</html>
